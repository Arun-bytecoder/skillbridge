services:
  - type: web
    name: skillbridge-api
    runtime: python
    pythonVersion: "3.10.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: MONITORING_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: MONITORING_API_KEY
        value: skillbridge-monitoring-key-2024